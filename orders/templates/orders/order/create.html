{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - SIGMA</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root { --sigma-dark: #1a1a1a; --sigma-red: #801010; --sigma-gray: #f8f8f8; }
        body { font-family: 'Open Sans', sans-serif; background-color: var(--sigma-gray); color: #333; }
        h3 { font-family: 'Montserrat', sans-serif; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
        
        .checkout-card {
            background: white;
            border: none;
            border-radius: 0;
            padding: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-top: 40px;
            margin-bottom: 60px;
        }

        /* Estilizamos los inputs de Django */
        input {
            width: 100%;
            padding: 12px 15px;
            margin-top: 8px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            font-family: 'Open Sans', sans-serif;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
            display: block;
        }

        input:focus { border-color: var(--sigma-dark); border-width: 1.5px; }

        label {
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 1px;
            margin-bottom: 0;
        }

        .btn-confirm {
            background: var(--sigma-dark);
            color: white;
            border: none;
            padding: 20px;
            width: 100%;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-confirm:hover { background: var(--sigma-red); color: white; }
        
        .header-simple { padding: 30px 0; text-align: center; border-bottom: 1px solid #eee; background: white; }
        .header-simple a { text-decoration: none; color: black; font-size: 24px; font-weight: 700; letter-spacing: 4px; }

        .shipping-info {
            background-color: #fff9f9;
            border-left: 3px solid var(--sigma-red);
            padding: 15px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <header class="header-simple">
        <a href="/" class="Montserrat">SIGMA</a>
    </header>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="checkout-card">
                    <h3 class="text-center mb-4">Detalles de Envío</h3>
                    
                    <div class="shipping-info">
                        <p class="mb-0 small" style="font-family: 'Montserrat'; font-weight: 600;">
                            <i class="bi bi-info-circle-fill me-2"></i> 
                            EL COSTO DE ENVÍO SE COORDINARÁ POR WHATSAPP LUEGO DEL PAGO.
                        </p>
                    </div>

                    <form action="." method="post">
                        {% csrf_token %}
                        
                        <div class="row">
                            <div class="col-md-6">
                                <label>Nombre</label>
                                {{ form.first_name }}
                            </div>
                            <div class="col-md-6">
                                <label>Apellido</label>
                                {{ form.last_name }}
                            </div>
                        </div>

                        <label>Correo Electrónico</label>
                        {{ form.email }}

                        <label>Teléfono / WhatsApp</label>
                        {{ form.phone }}

                        <label>Dirección de Entrega</label>
                        {{ form.address }}

                        <div class="row">
                            <div class="col-md-6">
                                <label>Código Postal</label>
                                {{ form.postal_code }}
                            </div>
                            <div class="col-md-6">
                                <label>Ciudad</label>
                                {{ form.city }}
                            </div>
                        </div>

                        <button type="submit" class="btn-confirm">Ir a Pagar</button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <a href="{% url 'cart:cart_detail' %}" class="text-muted small text-decoration-none">
                            <i class="bi bi-arrow-left me-1"></i> Volver al carrito
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
